<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">TPS Format Specification social card</title>
  <desc id="desc">TelePrompterScript: a markdown-first specification for teleprompter scripts with timing, pacing, emotion, and styling metadata.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#faf8f4"/>
      <stop offset="1" stop-color="#f0ebe0"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="82" y1="0" x2="500" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#b8963e"/>
      <stop offset="1" stop-color="#d4a847" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="4" fill="#b8963e"/>

  <!-- Left content -->
  <rect x="82" y="56" width="140" height="28" rx="14" fill="#f0ebe0" stroke="#d5cfc4"/>
  <text x="107" y="75" fill="#9a8e7c" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="1.2">OPEN SPEC</text>

  <text x="82" y="170" fill="#2c2418" font-family="Georgia, Playfair Display, serif" font-size="108" font-weight="700" letter-spacing="-3">TPS</text>
  <rect x="84" y="188" width="280" height="4" rx="2" fill="url(#goldLine)"/>

  <text x="82" y="248" fill="#2c2418" font-family="Georgia, Playfair Display, serif" font-size="38" font-weight="700" font-style="italic">Format Specification</text>
  <text x="82" y="286" fill="#b8963e" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="4">TELEPROMPTERSCRIPT</text>

  <text x="82" y="346" fill="#6b5e4d" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="500">Markdown-first teleprompter format with timing,</text>
  <text x="82" y="376" fill="#6b5e4d" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="500">pacing, emotion, and styling metadata.</text>

  <!-- Feature pills -->
  <rect x="82" y="416" width="164" height="34" rx="17" fill="#fef3c7" stroke="#d97706" stroke-opacity="0.3"/>
  <text x="104" y="438" fill="#d97706" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">Timing + Pauses</text>

  <rect x="262" y="416" width="152" height="34" rx="17" fill="#dbeafe" stroke="#2563eb" stroke-opacity="0.3"/>
  <text x="284" y="438" fill="#2563eb" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">Emotion Tags</text>

  <rect x="430" y="416" width="150" height="34" rx="17" fill="#d1fae5" stroke="#059669" stroke-opacity="0.3"/>
  <text x="452" y="438" fill="#059669" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">Actor Profile</text>

  <!-- Right panel — teleprompter preview -->
  <rect x="660" y="44" width="500" height="540" rx="16" fill="#080e12"/>

  <!-- Spotlight fade top -->
  <rect x="660" y="44" width="500" height="60" rx="16" fill="#080e12" opacity="0.9"/>

  <!-- Segment: Warm -->
  <rect x="684" y="86" width="452" height="140" rx="10" fill="#1c1408" fill-opacity="0.5"/>
  <rect x="684" y="86" width="3" height="140" rx="1.5" fill="#F59E0B"/>
  <circle cx="702" cy="104" r="4" fill="#F59E0B"/>
  <text x="714" y="108" fill="#F59E0B" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="700" letter-spacing="1.2" opacity="0.8">INTRO · WARM</text>
  <text x="700" y="142" fill="#e8d5b0" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="500" opacity="0.85">Good morning everyone,</text>
  <text x="700" y="170" fill="#e8d5b0" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="500" opacity="0.85">and <tspan text-decoration="underline" text-decoration-color="#c4a060">welcome</tspan> to what I believe</text>
  <text x="700" y="198" fill="#e8d5b0" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="500" opacity="0.85">will be a <tspan font-weight="700">transformative</tspan> moment.</text>

  <!-- Segment: Concerned -->
  <rect x="684" y="244" width="452" height="120" rx="10" fill="#1c0e0e" fill-opacity="0.5"/>
  <rect x="684" y="244" width="3" height="120" rx="1.5" fill="#EF4444"/>
  <circle cx="702" cy="262" r="4" fill="#EF4444"/>
  <text x="714" y="266" fill="#EF4444" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="700" letter-spacing="1.2" opacity="0.8">PROBLEM · CONCERNED</text>
  <text x="700" y="298" fill="#e8d5b0" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="500" opacity="0.85">But first, let's address the</text>
  <text x="700" y="326" fill="#e8d5b0" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="500" opacity="0.65" letter-spacing="0.8">elephant in the room.</text>

  <!-- Segment: Focused -->
  <rect x="684" y="382" width="452" height="120" rx="10" fill="#0d2818" fill-opacity="0.5"/>
  <rect x="684" y="382" width="3" height="120" rx="1.5" fill="#10B981"/>
  <circle cx="702" cy="400" r="4" fill="#10B981"/>
  <text x="714" y="404" fill="#10B981" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="700" letter-spacing="1.2" opacity="0.8">SOLUTION · FOCUSED</text>
  <text x="700" y="436" fill="#e8d5b0" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="500" opacity="0.85">That's where our <tspan font-weight="700">new platform</tspan></text>
  <text x="700" y="464" fill="#e8d5b0" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="500" opacity="0.85">comes in.</text>

  <!-- Spotlight fade bottom -->
  <rect x="660" y="504" width="500" height="80" rx="0" fill="#080e12" opacity="0.85"/>

  <!-- Bottom bar -->
  <text x="82" y="540" fill="#b8963e" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">prompter.one</text>
  <text x="200" y="540" fill="#9a8e7c" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="500">Open-source editor &amp; teleprompter</text>

  <text x="82" y="580" fill="#9a8e7c" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">tps.managed-code.com</text>
  <text x="310" y="580" fill="#d5cfc4" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="500">by Managed Code</text>
</svg>
