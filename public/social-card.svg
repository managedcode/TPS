<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">TPS Format Specification social card</title>
  <desc id="desc">TelePrompterScript: a markdown-first specification for teleprompter scripts with timing, pacing, emotion, and styling metadata.</desc>

  <defs>
    <linearGradient id="bg" x1="40" y1="22" x2="1158" y2="612" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10253B"/>
      <stop offset="0.54" stop-color="#0A1827"/>
      <stop offset="1" stop-color="#061019"/>
    </linearGradient>
    <radialGradient id="blueGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1010 84) rotate(133) scale(262 208)">
      <stop stop-color="#7CC8FF" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#7CC8FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="goldGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(206 542) rotate(18) scale(280 220)">
      <stop stop-color="#F3C36E" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#F3C36E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentLine" x1="82" y1="229" x2="442" y2="229" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F3C36E"/>
      <stop offset="1" stop-color="#7CC8FF"/>
    </linearGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" stroke="#90A8C6" stroke-opacity="0.07"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#07111A"/>
  <rect x="18" y="18" width="1164" height="594" fill="url(#bg)"/>
  <rect x="18" y="18" width="1164" height="594" fill="url(#grid)"/>
  <rect x="18" y="18" width="1164" height="594" fill="url(#blueGlow)"/>
  <rect x="18" y="18" width="1164" height="594" fill="url(#goldGlow)"/>
  <rect x="18.5" y="18.5" width="1163" height="593" stroke="#29435A"/>

  <text x="82" y="94" fill="#F3C36E" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" letter-spacing="2.4">MANAGED CODE / OPEN SPEC</text>

  <text x="82" y="208" fill="#F7FAFF" font-family="Georgia, Times New Roman, serif" font-size="124" font-weight="700">TPS</text>
  <rect x="84" y="226" width="360" height="6" fill="url(#accentLine)"/>
  <text x="82" y="294" fill="#F7FAFF" font-family="Georgia, Times New Roman, serif" font-size="56" font-weight="700">TelePrompterScript</text>
  <text x="82" y="340" fill="#F3C36E" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" letter-spacing="5.8">FORMAT SPECIFICATION</text>

  <text x="82" y="410" fill="#D7E5F3" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="600">Markdown-first teleprompter format</text>
  <text x="82" y="445" fill="#D7E5F3" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="600">with timing, pacing, emotion, and styling metadata.</text>
  <text x="82" y="480" fill="#D7E5F3" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="600">Built for Actor and RSVP reading workflows.</text>

  <text x="82" y="556" fill="#F3C36E" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700">Timing + Pauses</text>
  <text x="300" y="556" fill="#7CC8FF" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700">Emotion Tags</text>
  <text x="484" y="556" fill="#7BE0BA" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700">Actor + RSVP</text>

  <line x1="716" y1="84" x2="716" y2="548" stroke="#29435A" stroke-width="1"/>

  <circle cx="770" cy="94" r="6" fill="#FF7A72"/>
  <circle cx="794" cy="94" r="6" fill="#F3C36E"/>
  <circle cx="818" cy="94" r="6" fill="#7BE0BA"/>
  <text x="852" y="101" fill="#F7FAFF" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">format-signals.tps</text>

  <text x="760" y="164" fill="#8FA6C3" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" letter-spacing="2.1">SPEC SIGNALS</text>

  <text x="760" y="236" fill="#7CC8FF" font-family="Courier New, monospace" font-size="34" font-weight="700">140WPM</text>
  <text x="760" y="270" fill="#D7E5F3" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="600">Precise pacing for spoken delivery.</text>
  <line x1="760" y1="296" x2="1086" y2="296" stroke="#29435A" stroke-width="1"/>

  <text x="760" y="364" fill="#F3C36E" font-family="Courier New, monospace" font-size="30" font-weight="700">[warm]welcome[/warm]</text>
  <text x="760" y="398" fill="#D7E5F3" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="600">Emotion styling for natural narration.</text>
  <line x1="760" y1="424" x2="1086" y2="424" stroke="#29435A" stroke-width="1"/>

  <text x="760" y="492" fill="#7BE0BA" font-family="Courier New, monospace" font-size="30" font-weight="700">Actor | RSVP</text>
  <text x="760" y="526" fill="#D7E5F3" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="600">Two reading profiles in one open spec.</text>

  <text x="878" y="584" fill="#8FA6C3" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">tps.managed-code.com</text>
</svg>
