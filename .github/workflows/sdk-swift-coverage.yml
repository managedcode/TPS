name: SDK Swift Coverage

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
    paths:
      - "SDK/swift/**"
      - "SDK/fixtures/**"
      - "examples/**"
      - ".github/workflows/sdk-swift.yml"
      - ".github/workflows/sdk-swift-coverage.yml"
  pull_request:
    paths:
      - "SDK/swift/**"
      - "SDK/fixtures/**"
      - "examples/**"
      - ".github/workflows/sdk-swift.yml"
      - ".github/workflows/sdk-swift-coverage.yml"
  workflow_dispatch:

jobs:
  coverage:
    name: Coverage 90%+
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - run: cd SDK/swift && ./coverage.sh
